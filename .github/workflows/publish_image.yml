name: publish_image

# Build the pinned Docker image once (compiling PX4) and push it to GHCR so that
# `./scripts/run.sh` can PULL a ready-to-run image instead of compiling PX4 on the
# reviewer's machine. Runs on push to the default branch and on demand.
# GHA layer-cache keeps repeat builds fast. Uses the built-in GITHUB_TOKEN (no PAT).

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (compiles PX4 first time, then GHA-cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/drone_system:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
