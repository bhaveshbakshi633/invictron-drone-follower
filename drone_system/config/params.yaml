# ============================================================================
# Central configuration for the drone-follows-car stack.
# EVERY threshold the reviewer cares about lives here. Nothing is hardcoded in
# the nodes -- each node declares these parameters and reads them at startup.
# Edit values here, relaunch, behaviour changes. No rebuild required.
# ============================================================================

# Applied to every node (shared logging location).
/**:
  ros__parameters:
    log_dir: "logs"          # relative to CWD where you launch, or absolute

car_sim:
  ros__parameters:
    path_type: "figure8"     # figure8 | circle
    path_scale_m: 20.0       # size of the loop
    speed_mps: 2.5           # how fast the car drives its loop
    publish_rate_hz: 30.0    # rate of /car/position
    noise_stddev_m: 0.0      # >0 injects Gaussian sensor noise (see ANALYSIS Q1)
    frame_id: "map"

follower:
  ros__parameters:
    offset_distance_m: 5.0   # how far behind the car the drone trails
    follow_altitude_m: 20.0  # cruise altitude while following
    car_timeout_ms: 200      # gap on /car/position beyond which we hover
    jump_threshold_m: 5.0    # single-step jump beyond which sample is rejected
    lead_time_s: 0.0         # optional extra follower look-ahead; the tracking-lag ROOT fix is px4_interface's setpoint velocity feed-forward (>0 = more lead)
    update_rate_hz: 50.0     # rate of /drone/waypoint
    frame_id: "map"
    # NOTE: the heading/velocity low-pass smoothing gains (0.3) in follower.py are
    # estimator TUNING constants, not decision THRESHOLDS -- the four spec-required
    # thresholds (200 ms / 3 retries / 5 m / 0.8 RTF) all live in this file.

px4_interface:
  ros__parameters:
    takeoff_altitude_m: 20.0
    arm_max_retries: 3       # RETRIES after the initial arm attempt (so 1+3 = 4 total attempts) before clean shutdown
    arm_retry_delay_s: 2.0
    force_arm_fail_n: 0      # fault injection for the failure demo: set >= 4 (i.e. 1+arm_max_retries) to withhold every attempt and force the arm-retry -> clean-shutdown path (0 = normal)
    offboard_rate_hz: 20.0   # PX4 needs >2 Hz setpoints to stay in OFFBOARD
    min_altitude_check_m: 1.0        # in-flight low-altitude safety floor (also the CI gate)
    takeoff_reach_tolerance_m: 0.5   # altitude band within takeoff_altitude_m that counts as "reached"
    low_alt_warn_period_s: 5.0       # min seconds between repeated low-altitude warnings
    arm_ready_timeout_s: 180.0       # wall-clock budget for PX4 pre-arm checks (generous: the GUI can drop RTF to ~0.2)
    vel_ff_gain: 1.0                 # 0..1 FF gain; 1.0 = best offset tracking (measured); lower shrinks lobe overshoot slightly but degrades the 5 m offset

health_monitor:
  ros__parameters:
    rtf_min: 0.8             # warn if real-time factor drops below this
    rtf_warn_period_s: 5.0   # how often to repeat the warning while degraded
    rtf_sample_period_s: 1.0
